<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Desktop Pet Agent</title>
  <style>
    :root {
      --bg: #f4f5f1;
      --surface: #ffffff;
      --panel: #fbfcf8;
      --ink: #20231f;
      --muted: #667067;
      --line: #dfe4d9;
      --green: #3f7f58;
      --blue: #4e73a4;
      --rose: #ae5e71;
      --gold: #a97b31;
      --teal: #4d8580;
      --violet: #7163a3;
      --shadow: 0 14px 36px rgba(35, 42, 31, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input, select, textarea { font: inherit; }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
    }

    button.primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    button:disabled {
      cursor: wait;
      color: var(--muted);
      background: #eef1eb;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
    }

    input, select { height: 38px; padding: 0 10px; }

    textarea {
      min-height: 116px;
      resize: vertical;
      padding: 10px 11px;
      line-height: 1.45;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .topbar {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 3px;
      font-size: 21px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
    }

    .top-controls {
      display: grid;
      grid-template-columns: 230px 108px 88px 92px;
      gap: 8px;
      align-items: center;
    }

    main {
      max-width: 1240px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 20px 38px;
      display: grid;
      gap: 18px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(340px, 0.75fr);
      gap: 18px;
      align-items: stretch;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-head {
      padding: 15px 16px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
    }

    .stamp {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .stamp.error { color: #9b3d3d; }

    .stage-panel {
      overflow: hidden;
    }

    .desktop-stage {
      min-height: 430px;
      padding: 18px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 16px;
      background:
        linear-gradient(180deg, #f9fbf6 0%, #eef3eb 60%, #e3eadf 100%);
      position: relative;
    }

    .scene {
      min-height: 286px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.2)),
        repeating-linear-gradient(90deg, rgba(77,133,128,0.08) 0 1px, transparent 1px 62px);
      position: relative;
      overflow: hidden;
    }

    .desk-line {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 54px;
      height: 1px;
      background: var(--line);
    }

    .pet-wrap {
      position: absolute;
      left: var(--pet-x, 50%);
      bottom: 56px;
      width: clamp(132px, 24vw, 220px);
      aspect-ratio: 1;
      transform: translateX(-50%);
      animation: roam 8s ease-in-out infinite;
      display: grid;
      place-items: center;
    }

    .pet-avatar {
      width: 86%;
      height: 86%;
      object-fit: contain;
      filter: drop-shadow(0 18px 18px rgba(34, 43, 35, 0.18));
      animation: breathe 2.8s ease-in-out infinite;
    }

    .default-pet {
      width: 78%;
      height: 72%;
      border: 3px solid #263027;
      border-radius: 42% 42% 36% 36%;
      background:
        radial-gradient(circle at 34% 39%, #253027 0 5px, transparent 6px),
        radial-gradient(circle at 65% 39%, #253027 0 5px, transparent 6px),
        radial-gradient(circle at 49% 55%, #253027 0 4px, transparent 5px),
        linear-gradient(135deg, #ffffff, #dce7d7);
      position: relative;
      filter: drop-shadow(0 18px 18px rgba(34, 43, 35, 0.16));
      animation: breathe 2.8s ease-in-out infinite;
    }

    .default-pet::before,
    .default-pet::after {
      content: "";
      position: absolute;
      top: -24px;
      width: 48px;
      height: 52px;
      border: 3px solid #263027;
      background: #edf5e8;
      z-index: -1;
    }

    .default-pet::before {
      left: 14px;
      border-radius: 12px 42px 18px 32px;
      transform: rotate(-18deg);
    }

    .default-pet::after {
      right: 14px;
      border-radius: 42px 12px 32px 18px;
      transform: rotate(18deg);
    }

    .speech {
      position: absolute;
      left: 18px;
      top: 18px;
      max-width: min(460px, calc(100% - 36px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.45;
      box-shadow: 0 8px 18px rgba(35,42,31,0.08);
    }

    .stage-footer {
      display: grid;
      gap: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .actions button { padding: 0 8px; }

    .state {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.72);
      padding: 9px;
      min-width: 0;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      align-items: center;
      margin-bottom: 7px;
      font-size: 12px;
    }

    .metric-value {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .bar,
    .stat-track {
      height: 8px;
      border-radius: 999px;
      background: #e9ede5;
      overflow: hidden;
    }

    .bar span,
    .stat-track span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: 999px;
      transition: width 180ms ease;
    }

    .hunger { background: var(--gold); }
    .thirst { background: var(--blue); }
    .energy { background: var(--teal); }
    .mood { background: var(--rose); }
    .cleanliness { background: var(--green); }
    .affection { background: var(--violet); }

    .side-stack {
      display: grid;
      gap: 18px;
    }

    .memories,
    .assistant-box,
    .stats {
      padding: 14px 16px 16px;
      display: grid;
      gap: 10px;
    }

    .memory-item {
      border-left: 3px solid var(--green);
      background: var(--panel);
      padding: 10px 11px;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      line-height: 1.45;
    }

    .memory-item .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .assistant-tools {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px;
    }

    .assistant-result {
      min-height: 74px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px 11px;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 13px;
      color: var(--ink);
    }

    .create-form {
      padding: 14px 16px 16px;
      display: grid;
      grid-template-columns: 1fr 150px 130px auto;
      gap: 8px;
    }

    .lower-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
      gap: 18px;
      align-items: start;
    }

    .image-lab {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 16px;
      padding: 14px 16px 16px;
    }

    .image-form {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .image-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .image-actions button { padding: 0 12px; }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .preview-box {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .preview-label {
      color: var(--muted);
      font-size: 12px;
    }

    .preview-frame {
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 12px;
    }

    .preview-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .stat-line {
      display: grid;
      grid-template-columns: 72px 1fr 54px;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }

    .stat-track span { background: var(--green); }

    .empty {
      color: var(--muted);
      font-size: 13px;
    }

    @keyframes roam {
      0%, 100% { transform: translateX(-52%) translateY(0); }
      45% { transform: translateX(-48%) translateY(-4px); }
      65% { transform: translateX(-50%) translateY(0); }
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-5px) scale(1.025); }
    }

    @media (max-width: 980px) {
      .topbar,
      .hero-grid,
      .lower-grid {
        grid-template-columns: 1fr;
      }

      .top-controls {
        grid-template-columns: 1fr 108px 88px 92px;
      }

      .state {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .image-lab {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      main { padding-inline: 12px; }
      .topbar { padding-inline: 12px; }
      .top-controls,
      .create-form,
      .assistant-tools,
      .preview-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .state {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <div>
          <h1>Desktop Pet Agent</h1>
          <div class="sub" id="petLabel">网页已废弃为调试后台；日常交流和形象定制请使用 Telegram。</div>
        </div>
        <div class="top-controls">
          <select id="petSelect" aria-label="Pet"></select>
          <select id="range" aria-label="Stats range">
            <option value="day">今日</option>
            <option value="week">本周</option>
            <option value="month">本月</option>
          </select>
          <button id="refresh" class="primary" type="button">刷新</button>
          <button id="tick" type="button">+30 分</button>
        </div>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">网页入口已废弃</h2>
          <span class="stamp">debug only</span>
        </div>
        <div class="assistant-box">
          <div class="assistant-result">这个页面只保留给本地调试。产品主入口是桌面悬浮宠物；日常交流、照顾和定制形象都应该在 Telegram 里完成。</div>
        </div>
      </section>

      <section class="hero-grid">
        <div class="panel stage-panel">
          <div class="desktop-stage">
            <div class="scene">
              <div class="speech" id="speech">我在桌面上等你。选一只宠物，或者先创建一个伙伴。</div>
              <div class="desk-line"></div>
              <div class="pet-wrap" id="petWrap">
                <div class="default-pet" id="defaultPet"></div>
              </div>
            </div>
            <div class="stage-footer">
              <div class="actions">
                <button data-action="pet" type="button">摸摸</button>
                <button data-action="play" class="primary" type="button">陪玩</button>
                <button data-action="feed" type="button">喂饭</button>
                <button data-action="refill" type="button">加水</button>
                <button data-action="clean" type="button">清洁</button>
                <button data-action="lullaby" type="button">哄睡</button>
              </div>
              <div class="state" id="stateGrid"></div>
            </div>
          </div>
        </div>

        <div class="side-stack">
          <section class="panel">
            <div class="panel-head">
              <h2 class="panel-title">陪伴回忆</h2>
              <span class="stamp" id="stateTime">--</span>
            </div>
            <div class="memories" id="memoryList">
              <div class="empty">还没有新的共同经历。</div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2 class="panel-title">工作助手</h2>
              <span class="stamp" id="assistantStatus">Ready</span>
            </div>
            <div class="assistant-box">
              <textarea id="assistantInput" placeholder="把一段文字给宠物，它可以先帮你总结，或者整理成待办。"></textarea>
              <div class="assistant-tools">
                <select id="assistantMode" aria-label="Assistant mode">
                  <option value="summarize">总结</option>
                  <option value="todos">整理待办</option>
                </select>
                <button id="assistantSubmit" class="primary" type="button">让宠物帮忙</button>
              </div>
              <div class="assistant-result" id="assistantResult">等待任务。</div>
            </div>
          </section>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">创建虚拟宠物</h2>
          <span class="stamp">local demo</span>
        </div>
        <div class="create-form">
          <input id="newPetName" type="text" value="豆包" aria-label="Pet name">
          <select id="newPetPersonality" aria-label="Personality">
            <option value="sweet">甜甜</option>
            <option value="cool">酷酷</option>
            <option value="energetic" selected>活泼</option>
            <option value="gentle">温柔</option>
          </select>
          <input id="newOwnerCall" type="text" value="姐姐" aria-label="Owner call name">
          <button id="createPet" class="primary" type="button">创建</button>
        </div>
      </section>

      <section class="lower-grid">
        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">定制形象</h2>
            <span class="stamp" id="imageStatus">Ready</span>
          </div>
          <div class="image-lab">
            <form class="image-form" id="imageForm">
              <input id="imageInput" name="image" type="file" accept="image/png,image/jpeg,image/webp">
              <select id="styleMode" name="style_mode" aria-label="Style mode">
                <option value="figurine_3d">3D Pixel Figurine</option>
              </select>
              <textarea id="styleInput" name="style" placeholder="例如：保留原服装配色、保留眼镜、干净白底、减少碎块"></textarea>
              <div class="image-actions">
                <button id="styleSubmit" class="primary" type="submit">生成形象</button>
                <button id="confirmCharacter" type="button">确认并设为当前宠物</button>
              </div>
              <select id="characterSelect" aria-label="Confirmed character">
                <option value="">没有角色</option>
              </select>
              <div class="image-actions">
                <button id="useCharacter" type="button">使用选中角色</button>
              </div>
              <textarea id="eventInput" placeholder="例如：喝水照、震惊表情包、下班累瘫"></textarea>
              <div class="image-actions">
                <button id="eventSubmit" type="button">生成事件图</button>
              </div>
            </form>
            <div class="preview-grid">
              <div class="preview-box">
                <span class="preview-label">输入</span>
                <div class="preview-frame" id="inputPreview">No image</div>
              </div>
              <div class="preview-box">
                <span class="preview-label">输出</span>
                <div class="preview-frame" id="outputPreview">No result</div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">状态统计</h2>
            <span class="stamp" id="statsRange">--</span>
          </div>
          <div class="stats" id="statsGrid"></div>
        </section>
      </section>
    </main>
  </div>

  <script>
    const stateKeys = [
      ["hunger", "饥饿"],
      ["thirst", "口渴"],
      ["energy", "精力"],
      ["mood", "心情"],
      ["cleanliness", "清洁"],
      ["affection", "亲密"]
    ];

    const statKeys = [
      ["eat_count", "吃饭"],
      ["drink_count", "喝水"],
      ["poop_count", "便便"],
      ["play_count", "玩耍"],
      ["sleep_minutes", "睡眠"]
    ];

    const actionLabels = {
      pet: "摸摸",
      play: "陪玩",
      feed: "喂饭",
      refill: "加水",
      clean: "清洁",
      lullaby: "哄睡"
    };

    const stateGrid = document.querySelector("#stateGrid");
    const statsGrid = document.querySelector("#statsGrid");
    const memoryList = document.querySelector("#memoryList");
    const speech = document.querySelector("#speech");
    const petWrap = document.querySelector("#petWrap");
    const defaultPet = document.querySelector("#defaultPet");
    const stateTime = document.querySelector("#stateTime");
    const statsRange = document.querySelector("#statsRange");
    const petLabel = document.querySelector("#petLabel");
    const petSelect = document.querySelector("#petSelect");
    const rangeInput = document.querySelector("#range");
    const newPetName = document.querySelector("#newPetName");
    const newPetPersonality = document.querySelector("#newPetPersonality");
    const newOwnerCall = document.querySelector("#newOwnerCall");
    const assistantInput = document.querySelector("#assistantInput");
    const assistantMode = document.querySelector("#assistantMode");
    const assistantSubmit = document.querySelector("#assistantSubmit");
    const assistantStatus = document.querySelector("#assistantStatus");
    const assistantResult = document.querySelector("#assistantResult");
    const imageForm = document.querySelector("#imageForm");
    const imageInput = document.querySelector("#imageInput");
    const styleMode = document.querySelector("#styleMode");
    const styleInput = document.querySelector("#styleInput");
    const styleSubmit = document.querySelector("#styleSubmit");
    const confirmCharacter = document.querySelector("#confirmCharacter");
    const useCharacter = document.querySelector("#useCharacter");
    const characterSelect = document.querySelector("#characterSelect");
    const eventInput = document.querySelector("#eventInput");
    const eventSubmit = document.querySelector("#eventSubmit");
    const imageStatus = document.querySelector("#imageStatus");
    const inputPreview = document.querySelector("#inputPreview");
    const outputPreview = document.querySelector("#outputPreview");

    let pets = [];
    let characters = [];
    let lastGenerated = null;

    function petId() {
      return Number(petSelect.value || 1);
    }

    function currentPet() {
      return pets.find((pet) => Number(pet.id) === petId()) || null;
    }

    function parseProfile(pet) {
      if (!pet || !pet.profile_json) return {};
      try {
        return JSON.parse(pet.profile_json);
      } catch {
        return {};
      }
    }

    async function request(path, options = {}) {
      const base = options.body instanceof FormData ? options : {
        headers: {"Content-Type": "application/json"},
        ...options
      };
      const response = await fetch(path, base);
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.detail || "Request failed");
      return payload;
    }

    function rounded(value) {
      return Math.round(Number(value || 0));
    }

    function showStamp(element, text, isError = false) {
      element.textContent = text;
      element.className = isError ? "stamp error" : "stamp";
    }

    function setSpeech(text) {
      speech.textContent = text;
    }

    function memoryKey() {
      return `desktop-pet-memories:${petId()}`;
    }

    function loadMemories() {
      try {
        return JSON.parse(localStorage.getItem(memoryKey()) || "[]");
      } catch {
        return [];
      }
    }

    function saveMemories(memories) {
      localStorage.setItem(memoryKey(), JSON.stringify(memories.slice(0, 12)));
    }

    function renderMemories() {
      const memories = loadMemories();
      if (!memories.length) {
        memoryList.innerHTML = `<div class="empty">还没有新的共同经历。</div>`;
        return;
      }
      memoryList.innerHTML = memories.slice(0, 6).map((memory) => `
        <div class="memory-item">
          <div>${memory.text}</div>
          <div class="meta">${memory.meta}</div>
        </div>
      `).join("");
    }

    function addMemory(text, meta = "") {
      const memories = loadMemories();
      memories.unshift({
        text,
        meta: meta || new Date().toLocaleString("zh-CN", {hour12: false})
      });
      saveMemories(memories);
      renderMemories();
    }

    function renderAvatar() {
      const pet = currentPet();
      const profile = parseProfile(pet);
      const avatar = profile.avatar_image_url;
      const existing = petWrap.querySelector("img");
      if (existing) existing.remove();
      defaultPet.style.display = avatar ? "none" : "block";
      if (avatar) {
        const img = document.createElement("img");
        img.className = "pet-avatar";
        img.src = avatar;
        img.alt = pet ? pet.name : "pet avatar";
        petWrap.appendChild(img);
      }
    }

    async function loadPets(selectedId = "") {
      pets = await request("/pets");
      petSelect.innerHTML = pets.map((pet) => (
        `<option value="${pet.id}">${pet.name} · ${pet.pet_mode} · ${pet.personality}</option>`
      )).join("");
      if (selectedId) {
        petSelect.value = selectedId;
      } else if (pets.length > 0) {
        const preferred = pets.find((pet) => pet.pet_mode === "virtual") || pets[0];
        petSelect.value = String(preferred.id);
      }
      renderAvatar();
      renderMemories();
    }

    async function createVirtualPet() {
      try {
        const pet = await request("/pets", {
          method: "POST",
          body: JSON.stringify({
            name: newPetName.value.trim() || "豆包",
            species: "cat",
            personality: newPetPersonality.value,
            owner_call_name: newOwnerCall.value.trim() || "姐姐",
            pet_mode: "virtual"
          })
        });
        await loadPets(String(pet.id));
        addMemory(`${pet.name} 来到桌面了。`, "创建宠物");
        await refresh();
      } catch (error) {
        setSpeech(error.message);
      }
    }

    function renderState(snapshot) {
      const state = snapshot.state;
      stateGrid.innerHTML = stateKeys.map(([key, label]) => {
        const value = rounded(state[key]);
        return `
          <div class="metric">
            <div class="metric-row">
              <span>${label}</span>
              <span class="metric-value">${value}</span>
            </div>
            <div class="bar"><span class="${key}" style="width:${value}%"></span></div>
          </div>
        `;
      }).join("");

      const pet = currentPet();
      const name = pet ? pet.name : `pet_id=${snapshot.pet_id}`;
      stateTime.textContent = snapshot.now.replace("T", " ").slice(0, 19);
      petLabel.textContent = `${name} · ${snapshot.personality} · 桌面陪伴中`;

      const x = 34 + Math.max(0, Math.min(32, state.mood / 100 * 32));
      petWrap.style.setProperty("--pet-x", `${x}%`);
      if (state.energy < 24) setSpeech(`${name} 有点困，想在桌面角落眯一会儿。`);
      else if (state.hunger > 74) setSpeech(`${name} 正在看着你，好像在暗示饭点到了。`);
      else if (state.thirst > 74) setSpeech(`${name} 想喝水了，水碗可能需要一点关注。`);
      else if (state.mood > 72) setSpeech(`${name} 今天心情不错，适合陪你一起开工。`);
      else setSpeech(`${name} 在桌面上陪着你。`);
    }

    function renderStats(stats) {
      const totals = stats.totals;
      const maxCount = Math.max(1, totals.eat_count, totals.drink_count, totals.poop_count, totals.play_count);
      statsGrid.innerHTML = statKeys.map(([key, label]) => {
        const raw = Number(totals[key] || 0);
        const display = key === "sleep_minutes" ? `${Math.round(raw / 60 * 10) / 10}h` : String(raw);
        const width = key === "sleep_minutes" ? Math.min(100, raw / 600 * 100) : raw / maxCount * 100;
        return `
          <div class="stat-line">
            <span>${label}</span>
            <div class="stat-track"><span style="width:${width}%"></span></div>
            <strong>${display}</strong>
          </div>
        `;
      }).join("");
      statsRange.textContent = `${stats.range} · ${stats.start_date} to ${stats.end_date}`;
    }

    function messageFromResult(action, result) {
      const generated = result.event_result && result.event_result.message;
      if (generated && generated.message) return generated.message;
      return `${actionLabels[action] || "操作"}完成了。`;
    }

    async function refresh() {
      try {
        const id = petId();
        const range = rangeInput.value;
        const [snapshot, stats] = await Promise.all([
          request(`/virtual-pets/${id}`),
          request(`/pets/${id}/stats?range=${range}`)
        ]);
        renderState(snapshot);
        renderStats(stats);
        renderAvatar();
      } catch (error) {
        setSpeech(error.message);
      }
    }

    async function runAction(action) {
      try {
        setSpeech(`${actionLabels[action]}中。`);
        const result = await request(`/virtual-pets/${petId()}/actions`, {
          method: "POST",
          body: JSON.stringify({action})
        });
        renderState(result.snapshot);
        const line = messageFromResult(action, result);
        setSpeech(line);
        addMemory(line, `${actionLabels[action] || action} · ${new Date().toLocaleString("zh-CN", {hour12: false})}`);
        await refresh();
      } catch (error) {
        setSpeech(error.message);
      }
    }

    async function tick() {
      try {
        const result = await request(`/virtual-pets/${petId()}/tick`, {
          method: "POST",
          body: JSON.stringify({minutes: 30})
        });
        renderState(result.snapshot);
        if (result.event) {
          const line = messageFromResult("时间流逝", result);
          setSpeech(line);
          addMemory(line, `${result.event.behavior} · ${result.event.occurred_at.replace("T", " ").slice(0, 19)}`);
        }
        await refresh();
      } catch (error) {
        setSpeech(error.message);
      }
    }

    async function runAssistant() {
      const text = assistantInput.value.trim();
      if (!text) {
        showStamp(assistantStatus, "请输入内容", true);
        return;
      }
      try {
        assistantSubmit.disabled = true;
        showStamp(assistantStatus, "Working");
        const payload = await request("/assistant/text", {
          method: "POST",
          body: JSON.stringify({mode: assistantMode.value, text})
        });
        assistantResult.textContent = `${payload.title}\n\n${payload.result}`;
        addMemory(`我帮主人完成了一次${assistantMode.value === "todos" ? "待办整理" : "文字总结"}。`, "工作助手");
        setSpeech(payload.title);
        showStamp(assistantStatus, "Done");
      } catch (error) {
        showStamp(assistantStatus, error.message, true);
      } finally {
        assistantSubmit.disabled = false;
      }
    }

    function renderImagePreview(target, url, alt) {
      target.innerHTML = "";
      const image = document.createElement("img");
      image.src = url;
      image.alt = alt;
      target.appendChild(image);
    }

    function renderImageText(target, text) {
      target.innerHTML = "";
      target.textContent = text;
    }

    async function generateStyledImage(event) {
      event.preventDefault();
      const file = imageInput.files[0];
      const style = styleInput.value.trim();
      if (!file) return showStamp(imageStatus, "请选择图片", true);
      if (!style) return showStamp(imageStatus, "请描述风格", true);

      try {
        styleSubmit.disabled = true;
        showStamp(imageStatus, "Generating");
        renderImageText(outputPreview, "Working...");
        const body = new FormData();
        body.append("image", file);
        body.append("style", style);
        body.append("style_mode", styleMode.value);
        const payload = await request("/image-style", {method: "POST", body});
        renderImagePreview(outputPreview, `${payload.image_url}?t=${Date.now()}`, "Styled image");
        lastGenerated = payload;
        showStamp(imageStatus, "Generated");
      } catch (error) {
        renderImageText(outputPreview, "No result");
        showStamp(imageStatus, error.message, true);
      } finally {
        styleSubmit.disabled = false;
      }
    }

    async function loadCharacters(selectedId = "") {
      try {
        characters = await request("/characters");
        characterSelect.innerHTML = [
          `<option value="">没有角色</option>`,
          ...characters.map((character) => (
            `<option value="${character.id}">${character.description || character.id.slice(0, 8)}</option>`
          ))
        ].join("");
        if (selectedId) characterSelect.value = selectedId;
      } catch (error) {
        showStamp(imageStatus, error.message, true);
      }
    }

    async function setPetAvatar(character) {
      const pet = currentPet();
      if (!pet) throw new Error("请先选择宠物");
      const profile = parseProfile(pet);
      profile.avatar_image_url = character.image_url;
      profile.character_id = character.id;
      if (character.desktop_pet_manifest_url) {
        profile.desktop_pet_manifest_url = character.desktop_pet_manifest_url;
        profile.desktop_pet_asset_dir = character.desktop_pet_asset_dir;
        profile.desktop_pet_avatar_url = character.desktop_pet_avatar_url;
      }
      const updated = await request(`/pets/${pet.id}`, {
        method: "PATCH",
        body: JSON.stringify({profile})
      });
      pets = pets.map((item) => Number(item.id) === Number(updated.id) ? updated : item);
      renderAvatar();
      addMemory(`${pet.name} 换上了新的桌面形象。`, "定制形象");
      setSpeech("这个形象我会带到桌面和日常交流里。");
    }

    async function confirmCurrentCharacter() {
      if (!lastGenerated) return showStamp(imageStatus, "请先生成形象", true);
      try {
        confirmCharacter.disabled = true;
        const character = await request("/characters", {
          method: "POST",
          body: JSON.stringify({
            image_url: lastGenerated.image_url,
            style_mode: lastGenerated.style_mode,
            description: styleInput.value.trim() || lastGenerated.style_mode
          })
        });
        const characterWithAssets = await request(`/characters/${character.id}/desktop-assets`, {
          method: "POST"
        });
        await loadCharacters(characterWithAssets.id);
        await setPetAvatar(characterWithAssets);
        showStamp(imageStatus, "Character confirmed");
      } catch (error) {
        showStamp(imageStatus, error.message, true);
      } finally {
        confirmCharacter.disabled = false;
      }
    }

    async function useSelectedCharacter() {
      const character = characters.find((item) => item.id === characterSelect.value);
      if (!character) return showStamp(imageStatus, "请选择角色", true);
      try {
        await setPetAvatar(character);
        showStamp(imageStatus, "Avatar updated");
      } catch (error) {
        showStamp(imageStatus, error.message, true);
      }
    }

    async function generateCharacterEvent() {
      const characterId = characterSelect.value;
      const prompt = eventInput.value.trim();
      if (!characterId) return showStamp(imageStatus, "请选择角色", true);
      if (!prompt) return showStamp(imageStatus, "请输入事件内容", true);
      try {
        eventSubmit.disabled = true;
        showStamp(imageStatus, "Generating event");
        renderImageText(outputPreview, "Working...");
        const payload = await request(`/characters/${characterId}/events`, {
          method: "POST",
          body: JSON.stringify({prompt})
        });
        renderImagePreview(outputPreview, `${payload.image_url}?t=${Date.now()}`, "Event image");
        addMemory(`我生成了一张新的事件图：${prompt}`, "形象记忆");
        showStamp(imageStatus, "Event generated");
      } catch (error) {
        renderImageText(outputPreview, "No result");
        showStamp(imageStatus, error.message, true);
      } finally {
        eventSubmit.disabled = false;
      }
    }

    async function loadImageStyles() {
      try {
        const styles = await request("/image-styles");
        styleMode.innerHTML = styles.map((style) => (
          `<option value="${style.id}">${style.label}</option>`
        )).join("");
      } catch (error) {
        showStamp(imageStatus, error.message, true);
      }
    }

    document.querySelector("#refresh").addEventListener("click", refresh);
    document.querySelector("#tick").addEventListener("click", tick);
    document.querySelector("#createPet").addEventListener("click", createVirtualPet);
    petSelect.addEventListener("change", () => {
      renderAvatar();
      renderMemories();
      refresh();
    });
    rangeInput.addEventListener("change", refresh);
    document.querySelectorAll("[data-action]").forEach((button) => {
      button.addEventListener("click", () => runAction(button.dataset.action));
    });
    assistantSubmit.addEventListener("click", runAssistant);
    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) {
        renderImageText(inputPreview, "No image");
        return;
      }
      renderImagePreview(inputPreview, URL.createObjectURL(file), file.name);
      renderImageText(outputPreview, "No result");
      lastGenerated = null;
      showStamp(imageStatus, "Ready");
    });
    imageForm.addEventListener("submit", generateStyledImage);
    confirmCharacter.addEventListener("click", confirmCurrentCharacter);
    useCharacter.addEventListener("click", useSelectedCharacter);
    eventSubmit.addEventListener("click", generateCharacterEvent);

    loadImageStyles();
    loadCharacters();
    loadPets().then(refresh).catch((error) => setSpeech(error.message));
  </script>
</body>
</html>
